name: Build Facade WGT
on:
  push:
    branches: [master]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup
        run: |
          curl -o ti "https://download.tizen.org/sdk/Installer/tizen-studio_4.5.1/web-cli_Tizen_Studio_4.5.1_ubuntu-64.bin"
          chmod +x ti && ./ti --accept-license "${GITHUB_WORKSPACE}/tizen-studio" && rm ti
          echo "${GITHUB_WORKSPACE}/tizen-studio/tools/ide/bin" >> $GITHUB_PATH
          echo "${GITHUB_WORKSPACE}/tizen-studio/tools" >> $GITHUB_PATH
          sudo apt install -y expect
      - name: Cert + profile
        run: |
          tizen certificate -a FP -p 1234 -f facade -e info@facade.nl
          tizen security-profiles add -n facade -a "${GITHUB_WORKSPACE}/tizen-studio-data/keystore/author/facade.p12" -p 1234
          tizen cli-config "profiles.path=${GITHUB_WORKSPACE}/tizen-studio-data/profile/profiles.xml"
      - name: Create app
        run: |
          mkdir -p app release
          cp facade-icon.png app/icon.png
          printf '<?xml version="1.0" encoding="UTF-8"?>\n<widget xmlns:tizen="http://tizen.org/ns/widgets" xmlns="http://www.w3.org/ns/widgets" id="http://facade.nl/player" version="1.0.0" viewmodes="fullscreen">\n<access origin="*" subdomains="true"></access>\n<tizen:application id="Fcd9NewApp.FacadePlayer" package="Fcd9NewApp" required_version="2.3"/>\n<content src="index.html"/>\n<icon src="icon.png"/>\n<name>Facade Player</name>\n<tizen:profile name="tv"/>\n<tizen:setting screen-orientation="landscape" context-menu="enable" background-support="enable" encryption="disable" install-location="auto" hwkey-event="enable"/>\n</widget>\n' > app/config.xml
          printf '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Facade</title></head><body style="background:#000"><script>window.location.replace("http://192.168.1.126:3001/tizen-player.htm");</script></body></html>\n' > app/index.html
      - name: Package
        run: |
          sed -i 's|password="[^"]*\.pwd"|password=""|g' ${GITHUB_WORKSPACE}/tizen-studio-data/profile/profiles.xml
          expect -c '
            set timeout -1
            spawn tizen package -t wgt -o ./release -s facade -- app
            expect "Author password:" { send "1234\r" }
            expect {
              "Yes: (Y), No: (N) ?" { send "N\r"; exp_continue }
              "Distributor1 password:" { send "tizenpkcs12passfordsigner\r"; exp_continue }
              "password:" { send "1234\r"; exp_continue }
              eof
            }
          '
          ls -la release/
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: FacadePlayer
          path: release/*.wgt
