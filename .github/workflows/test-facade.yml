name: Build Facade WGT

on:
  workflow_dispatch:

env:
  TIZEN_STUDIO_VER: 4.5.1

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'v23.11.1'

      - name: Install expect
        run: sudo apt install expect

      - name: Download Tizen Studio
        run: |
          curl -o tizen-installer "https://download.tizen.org/sdk/Installer/tizen-studio_${TIZEN_STUDIO_VER}/web-cli_Tizen_Studio_${TIZEN_STUDIO_VER}_ubuntu-64.bin"

      - name: Install Tizen Studio
        run: |
          chmod +x tizen-installer
          ./tizen-installer --accept-license "${GITHUB_WORKSPACE}/tizen-studio"
          rm tizen-installer

      - name: Prepare Tizen Certificate
        run: |
          ./tizen-studio/tools/ide/bin/tizen security-profiles add -n Jellyfin -a "${GITHUB_WORKSPACE}/tizencert.p12" -p 1234
          ./tizen-studio/tools/ide/bin/tizen cli-config "profiles.path=${GITHUB_WORKSPACE}/tizen-studio-data/profile/profiles.xml"
          chmod 755 "${GITHUB_WORKSPACE}/tizen-studio-data/profile/profiles.xml"

      - name: Create Facade app
        run: |
          mkdir -p facade-tizen
          cat > facade-tizen/config.xml << 'XML'
          <?xml version="1.0" encoding="UTF-8"?>
          <widget xmlns:tizen="http://tizen.org/ns/widgets" xmlns="http://www.w3.org/ns/widgets" id="http://facade.nl/player" version="0.1.0" viewmodes="fullscreen">
              <access origin="*" subdomains="true"></access>
              <tizen:application id="AprZAARz4r.Jellyfin" package="AprZAARz4r" required_version="2.3"/>
              <author href="http://facade.nl" email="info@facade.nl">Facade</author>
              <content src="index.html"/>
              <description>Facade Digital Signage Player</description>
              <feature name="http://tizen.org/feature/screen.size.all"/>
              <icon src="icon.png"/>
              <tizen:metadata key="http://tizen.org/metadata/app_ui_type/base_screen_resolution" value="fullscreen"/>
              <name>Facade Player</name>
              <tizen:privilege name="http://developer.samsung.com/privilege/productinfo"/>
              <tizen:privilege name="http://tizen.org/privilege/tv.inputdevice"/>
              <tizen:profile name="tv"/>
              <tizen:setting screen-orientation="landscape" context-menu="enable" background-support="enable" encryption="disable" install-location="auto" hwkey-event="enable"/>
          </widget>
          XML
          
          cat > facade-tizen/index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html><head><meta charset="UTF-8"><title>Facade Player</title></head>
          <body style="background:#000"><script>window.location.replace('http://192.168.1.126:3001/player-legacy.html');</script></body>
          </html>
          HTMLEOF
          
          # Maak een simpel icon
          cp ${GITHUB_WORKSPACE}/facade-icon.png facade-tizen/icon.png

      - name: Build Web
        run: |
          cd facade-tizen
          ../tizen-studio/tools/ide/bin/tizen build-web -e ".*" -e README.md -e "node_modules/*" -e "package*.json"

      - name: Prepare passwords
        run: |
          sed -i "s|${GITHUB_WORKSPACE}/tizencert.pwd|1234|g" ${GITHUB_WORKSPACE}/tizen-studio-data/profile/profiles.xml
          sed -i "s|${GITHUB_WORKSPACE}/tizen-studio-data/tools/certificate-generator/certificates/distributor/tizen-distributor-signer.pwd|tizenpkcs12passfordsigner|g" ${GITHUB_WORKSPACE}/tizen-studio-data/profile/profiles.xml
          sed -i 's|password=""|password="tizenpkcs12passfordsigner"|g' ${GITHUB_WORKSPACE}/tizen-studio-data/profile/profiles.xml

      - name: Package WGT
        run: |
          cd facade-tizen
          mkdir -p release
          expect -c '
            set timeout -1
            spawn ../tizen-studio/tools/ide/bin/tizen package -t wgt -o ./release -s Jellyfin -- .buildResult
            expect "Author password:"
            send -- "1234\r"
            expect "Yes: (Y), No: (N) ?"
            send -- "N\r"
            expect eof
          '
          ls -la release/

      - name: Upload WGT
        uses: actions/upload-artifact@v4
        with:
          name: FacadePlayer
          path: facade-tizen/release/*.wgt
          retention-days: 30
